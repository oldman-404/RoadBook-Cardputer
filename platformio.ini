; RoadBook — M5Stack Cardputer ADV (Stamp-S3A / ESP32-S3FN8, 8 MB flash, no PSRAM)
;
; Board: esp32-s3-devkitc-1 is the generic ESP32-S3 PlatformIO target used with the
; M5Cardputer library for hardware initialization on Cardputer ADV.

[env:m5stack-cardputer-adv]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters = esp32_exception_decoder
upload_speed = 1500000

board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv

build_flags =
    -DESP32S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    m5stack/M5Unified@^0.2.17
    m5stack/M5Cardputer@^1.1.1
    https://github.com/m5stack/TinyGPSPlus.git
